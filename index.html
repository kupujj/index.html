<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CS2 Mobile Web Shooter</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            /* Отключаем системные жесты браузера (свайпы назад/обновление) */
            touch-action: none; 
            -webkit-user-select: none;
            user-select: none;
        }

        /* Прицел */
        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            width: 16px; height: 16px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background: #00ff00;
        }
        #crosshair::before { top: 7px; left: 0; width: 16px; height: 2px; }
        #crosshair::after { top: 0; left: 7px; width: 2px; height: 16px; }

        /* Маркер попадания */
        #hit-marker {
            position: absolute;
            top: 55%; left: 50%;
            transform: translateX(-50%);
            color: #4CAF50;
            font-weight: bold;
            font-size: 22px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s, top 0.5s;
            z-index: 10;
            text-shadow: 1px 1px 2px #000;
        }

        /* Кнопка открытия меню поверх игры */
        #menu-toggle-btn {
            position: absolute;
            top: 15px; left: 15px;
            background: rgba(20, 20, 20, 0.8);
            border: 2px solid #555;
            color: white;
            padding: 10px 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            z-index: 20;
        }

        /* Мобильное Меню / Инвентарь (на весь экран) */
        #hud {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(20, 20, 20, 0.98);
            z-index: 30;
            display: none; /* Скрыто по умолчанию */
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        #close-menu-btn {
            align-self: flex-end;
            background: #ff4444;
            color: white; border: none;
            padding: 10px 20px;
            font-size: 16px; font-weight: bold;
            border-radius: 5px; margin-bottom: 20px;
        }

        .balance-container {
            font-size: 28px; font-weight: bold;
            color: #4CAF50; text-align: center;
            padding: 15px; background: rgba(0,255,0,0.1);
            border-radius: 8px; margin-bottom: 20px;
        }

        .case-section {
            background: #2a2a2a; padding: 20px;
            border-radius: 12px; text-align: center;
            margin-bottom: 20px;
        }
        
        #open-case-btn {
            background: #ffaa00; color: #000;
            border: none; padding: 15px;
            font-size: 18px; font-weight: bold;
            border-radius: 8px; width: 100%;
        }
        #open-case-btn:disabled { background: #555; color: #888; }

        #roulette {
            margin-top: 15px; height: 50px;
            background: #111; display: flex;
            align-items: center; justify-content: center;
            font-size: 20px; font-weight: bold;
            border-radius: 8px; border: 2px solid #444;
        }

        .inventory-section { flex-grow: 1; }
        .skin-item {
            display: flex; justify-content: space-between;
            align-items: center; background: #222;
            padding: 15px; margin-bottom: 10px;
            border-radius: 8px; border-left: 6px solid;
            font-size: 18px; font-weight: bold;
        }
        .equip-btn {
            background: #444; color: #fff;
            border: none; padding: 10px 15px;
            border-radius: 5px; font-size: 16px;
        }

        /* Визуальный джойстик слева */
        #joystick-zone {
            position: absolute;
            bottom: 30px; left: 30px;
            width: 120px; height: 120px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            pointer-events: none; /* Только для визуала */
            z-index: 10;
        }
        #joystick-knob {
            position: absolute;
            top: 50%; left: 50%;
            width: 50px; height: 50px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
</head>
<body>

    <button id="menu-toggle-btn">МЕНЮ / КЕЙСЫ</button>
    <div id="crosshair"></div>
    <div id="hit-marker">+$300</div>

    <div id="joystick-zone">
        <div id="joystick-knob"></div>
    </div>

    <div id="hud">
        <button id="close-menu-btn">Закрыть и играть</button>
        <div class="balance-container">Баланс: $<span id="balance-display">0</span></div>

        <div class="case-section">
            <button id="open-case-btn">Открыть кейс ($250)</button>
            <div id="roulette">???</div>
        </div>

        <div class="inventory-section">
            <h3 style="margin-top: 0;">Инвентарь</h3>
            <div id="inventory-list"></div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';

        // --- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ---
        let camera, scene, renderer, weapon;
        const targets = [];
        const raycaster = new THREE.Raycaster();
        const centerScreen = new THREE.Vector2(0, 0);

        // Переменные мобильного управления
        let touchLeftId = null;
        let touchRightId = null;
        
        // Для левого стика (бег)
        let moveVector = new THREE.Vector2(0, 0);
        let joystickCenter = new THREE.Vector2(0, 0);
        const maxJoystickRadius = 60;
        const joystickKnob = document.getElementById('joystick-knob');
        
        // Для правой стороны (вращение камеры и тап)
        let lastRightTouchX = 0, lastRightTouchY = 0;
        let euler = new THREE.Euler(0, 0, 0, 'YXZ');
        const touchSensitivity = 0.005;
        let rightTouchStartTime = 0;
        let rightTouchMoved = false;

        let prevTime = performance.now();

        // Экономика
        let playerBalance = 1000;
        let isCaseOpening = false;
        
        const skinDatabase = [
            { name: "Asimov", color: 0xff8800 },
            { name: "Hyper Beast", color: 0xff00ff },
            { name: "Dragon Lore", color: 0xffcc00 },
            { name: "Vulcan", color: 0x00aaff },
            { name: "Redline", color: 0xff0000 },
            { name: "Emerald", color: 0x00ff00 },
            { name: "Whiteout", color: 0xffffff }
        ];

        let playerInventory = [{ name: "Default", color: 0x555555 }];

        init();
        animate();

        function init() {
            // Сцена и камера
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 0, 50);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.y = 1.6;

            // Свет
            scene.add(new THREE.HemisphereLight(0xeeeeff, 0x777788, 0.75));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(20, 20, 20);
            scene.add(dirLight);

            // Пол и стены
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshLambertMaterial({ color: 0x3a4f3f }));
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            const wallMat = new THREE.MeshLambertMaterial({ color: 0x8c8c8c });
            const createWall = (w, h, d, x, z) => {
                const wall = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMat);
                wall.position.set(x, h/2, z);
                scene.add(wall);
            };
            createWall(40, 5, 1, 0, -20);
            createWall(40, 5, 1, 0, 20);
            createWall(1, 5, 40, -20, 0);
            createWall(1, 5, 40, 20, 0);

            // Оружие
            weapon = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.15, 0.6), new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.4 }));
            weapon.position.set(0.25, -0.25, -0.5); 
            camera.add(weapon);
            scene.add(camera);

            // Враги
            const targetGeo = new THREE.BoxGeometry(1, 2, 1);
            const targetMat = new THREE.MeshLambertMaterial({ color: 0xcc2222 });
            for (let i = 0; i < 10; i++) {
                const target = new THREE.Mesh(targetGeo, targetMat.clone());
                target.position.set((Math.random() - 0.5) * 35, 1, (Math.random() - 0.5) * 35);
                scene.add(target);
                targets.push(target);
            }

            // Рендерер
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // --- СЕНСОРНОЕ УПРАВЛЕНИЕ ---
            document.body.addEventListener('touchstart', handleTouchStart, {passive: false});
            document.body.addEventListener('touchmove', handleTouchMove, {passive: false});
            document.body.addEventListener('touchend', handleTouchEnd, {passive: false});

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // UI Логика
            document.getElementById('menu-toggle-btn').addEventListener('click', () => {
                document.getElementById('hud').style.display = 'flex';
            });
            document.getElementById('close-menu-btn').addEventListener('click', () => {
                document.getElementById('hud').style.display = 'none';
            });

            updateUI();
            renderInventory();
        }

        // --- ЛОГИКА ТАЧЕЙ ---
        function handleTouchStart(e) {
            // Если меню открыто, не обрабатываем тачи для игры
            if (document.getElementById('hud').style.display === 'flex') return;
            
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                
                // Левая половина экрана - Джойстик (Бег)
                if (touch.clientX < window.innerWidth / 2 && touchLeftId === null) {
                    touchLeftId = touch.identifier;
                    joystickCenter.set(touch.clientX, touch.clientY);
                    
                    // Перемещаем визуал джойстика под палец
                    const jZone = document.getElementById('joystick-zone');
                    jZone.style.left = (touch.clientX - 60) + 'px';
                    jZone.style.top = (touch.clientY - 60) + 'px';
                    jZone.style.bottom = 'auto';
                } 
                // Правая половина экрана - Камера и Стрельба
                else if (touch.clientX >= window.innerWidth / 2 && touchRightId === null) {
                    // Игнорируем нажатия на кнопку меню
                    if (e.target.id === 'menu-toggle-btn') continue;

                    touchRightId = touch.identifier;
                    lastRightTouchX = touch.clientX;
                    lastRightTouchY = touch.clientY;
                    rightTouchMoved = false;
                    rightTouchStartTime = Date.now();
                }
            }
        }

        function handleTouchMove(e) {
            if (document.getElementById('hud').style.display === 'flex') return;
            e.preventDefault(); // Запрещаем скролл

            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];

                if (touch.identifier === touchLeftId) {
                    // Вектор сдвига от центра джойстика
                    let deltaX = touch.clientX - joystickCenter.x;
                    let deltaY = touch.clientY - joystickCenter.y;
                    
                    const distance = Math.sqrt(deltaX*deltaX + deltaY*deltaY);
                    if (distance > maxJoystickRadius) {
                        deltaX = (deltaX / distance) * maxJoystickRadius;
                        deltaY = (deltaY / distance) * maxJoystickRadius;
                    }
                    
                    joystickKnob.style.transform = `translate(calc(-50% + ${deltaX}px), calc(-50% + ${deltaY}px))`;
                    
                    // Нормализуем для скорости (-1 до 1)
                    moveVector.set(deltaX / maxJoystickRadius, deltaY / maxJoystickRadius);
                } 
                else if (touch.identifier === touchRightId) {
                    rightTouchMoved = true;
                    
                    const movementX = touch.clientX - lastRightTouchX;
                    const movementY = touch.clientY - lastRightTouchY;

                    euler.setFromQuaternion(camera.quaternion);
                    euler.y -= movementX * touchSensitivity;
                    euler.x -= movementY * touchSensitivity;
                    
                    // Ограничение взгляда вверх-вниз (90 градусов)
                    euler.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, euler.x));

                    camera.quaternion.setFromEuler(euler);

                    lastRightTouchX = touch.clientX;
                    lastRightTouchY = touch.clientY;
                }
            }
        }

        function handleTouchEnd(e) {
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];

                if (touch.identifier === touchLeftId) {
                    touchLeftId = null;
                    moveVector.set(0, 0);
                    joystickKnob.style.transform = `translate(-50%, -50%)`;
                    // Возвращаем стик на дефолтное место
                    const jZone = document.getElementById('joystick-zone');
                    jZone.style.left = '30px';
                    jZone.style.bottom = '30px';
                    jZone.style.top = 'auto';
                } 
                else if (touch.identifier === touchRightId) {
                    touchRightId = null;
                    
                    // Если палец почти не двигался и отпущен быстро - это Выстрел
                    const touchDuration = Date.now() - rightTouchStartTime;
                    if (!rightTouchMoved || touchDuration < 250) {
                        shoot();
                    }
                }
            }
        }

        function shoot() {
            weapon.position.z += 0.05; 
            setTimeout(() => { weapon.position.z -= 0.05; }, 50);

            raycaster.setFromCamera(centerScreen, camera);
            const intersects = raycaster.intersectObjects(targets);

            if (intersects.length > 0) {
                const hitObject = intersects[0].object;
                
                playerBalance += 300;
                updateUI();
                
                const marker = document.getElementById('hit-marker');
                marker.style.opacity = 1; marker.style.top = '48%';
                setTimeout(() => { marker.style.opacity = 0; marker.style.top = '55%'; }, 500);

                const originalColor = hitObject.material.color.getHex();
                hitObject.material.color.setHex(0xffffff);
                setTimeout(() => {
                    hitObject.material.color.setHex(originalColor);
                    hitObject.position.set((Math.random() - 0.5) * 35, 1, (Math.random() - 0.5) * 35);
                }, 100);
            }
        }

        // --- ИГРОВОЙ ЦИКЛ ---
        function animate() {
            requestAnimationFrame(animate);

            const time = performance.now();
            const delta = (time - prevTime) / 1000;
            prevTime = time;

            // Движение персонажа
            if (touchLeftId !== null) {
                const speed = 10.0 * delta;
                
                // Векторы камеры для направления движения
                const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                forward.y = 0; forward.normalize();
                
                const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                right.y = 0; right.normalize();

                // Двигаем камеру в зависимости от отклонения джойстика (moveVector.y - вперед/назад, moveVector.x - стрейф)
                camera.position.add(forward.multiplyScalar(-moveVector.y * speed));
                camera.position.add(right.multiplyScalar(moveVector.x * speed));
            }

            renderer.render(scene, camera);
        }

        // --- ИНТЕРФЕЙС И КЕЙСЫ ---
        function updateUI() {
            document.getElementById('balance-display').innerText = playerBalance;
            const btn = document.getElementById('open-case-btn');
            btn.disabled = (playerBalance < 250 || isCaseOpening);
        }

        document.getElementById('open-case-btn').addEventListener('click', () => {
            if (playerBalance >= 250 && !isCaseOpening) {
                playerBalance -= 250;
                updateUI();
                startCaseRoulette();
            }
        });

        function startCaseRoulette() {
            isCaseOpening = true; updateUI();
            const roulette = document.getElementById('roulette');
            let ticks = 0; const maxTicks = 30;

            const interval = setInterval(() => {
                const randomSkin = skinDatabase[Math.floor(Math.random() * skinDatabase.length)];
                roulette.innerText = randomSkin.name;
                roulette.style.color = '#' + randomSkin.color.toString(16).padStart(6, '0');
                ticks++;

                if (ticks >= maxTicks) {
                    clearInterval(interval);
                    const finalSkin = skinDatabase[Math.floor(Math.random() * skinDatabase.length)];
                    roulette.innerText = `Выпало: ${finalSkin.name}!`;
                    roulette.style.color = '#' + finalSkin.color.toString(16).padStart(6, '0');
                    
                    playerInventory.push(finalSkin);
                    renderInventory();
                    isCaseOpening = false; updateUI();
                }
            }, 60);
        }

        function renderInventory() {
            const list = document.getElementById('inventory-list');
            list.innerHTML = '';
            playerInventory.forEach((skin) => {
                const div = document.createElement('div');
                div.className = 'skin-item';
                div.style.borderColor = '#' + skin.color.toString(16).padStart(6, '0');
                
                const span = document.createElement('span');
                span.innerText = skin.name;
                span.style.color = '#' + skin.color.toString(16).padStart(6, '0');

                const btn = document.createElement('button');
                btn.className = 'eq
