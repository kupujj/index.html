<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CS2 Mobile Web Shooter</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background-color: #000; font-family: sans-serif; color: #fff;
            touch-action: none; -webkit-user-select: none; user-select: none;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 16px; height: 16px;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 10;
        }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: #00ff00; }
        #crosshair::before { top: 7px; left: 0; width: 16px; height: 2px; }
        #crosshair::after { top: 0; left: 7px; width: 2px; height: 16px; }
        #error-log {
            position: absolute; top: 10%; left: 5%; color: red; font-weight: bold; z-index: 9999; pointer-events: none;
        }
        #hit-marker {
            position: absolute; top: 55%; left: 50%; transform: translateX(-50%);
            color: #4CAF50; font-weight: bold; font-size: 22px; opacity: 0;
            pointer-events: none; transition: opacity 0.2s, top 0.5s; z-index: 10;
        }
        #menu-toggle-btn {
            position: absolute; top: 15px; left: 15px; background: rgba(20,20,20,0.8);
            border: 2px solid #555; color: white; padding: 10px 15px; border-radius: 8px; z-index: 20;
        }
        #hud {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(20,20,20,0.98); z-index: 30; display: none;
            flex-direction: column; padding: 20px; box-sizing: border-box; overflow-y: auto;
        }
        #close-menu-btn { align-self: flex-end; background: #ff4444; color: white; border: none; padding: 10px; border-radius: 5px; margin-bottom: 20px; }
        .balance-container { font-size: 24px; color: #4CAF50; text-align: center; padding: 15px; background: rgba(0,255,0,0.1); margin-bottom: 20px; }
        .case-section { background: #2a2a2a; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 20px; }
        #open-case-btn { background: #ffaa00; border: none; padding: 15px; width: 100%; font-weight: bold; }
        #roulette { margin-top: 15px; height: 50px; background: #111; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .inventory-section { flex-grow: 1; }
        .skin-item { display: flex; justify-content: space-between; padding: 15px; background: #222; margin-bottom: 10px; border-left: 6px solid; }
        #joystick-zone { position: absolute; bottom: 30px; left: 30px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; z-index: 10; pointer-events: none; }
        #joystick-knob { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: rgba(255,255,255,0.5); border-radius: 50%; transform: translate(-50%, -50%); }
    </style>
</head>
<body>
    <div id="error-log"></div>
    <button id="menu-toggle-btn">МЕНЮ / КЕЙСЫ</button>
    <div id="crosshair"></div>
    <div id="hit-marker">+$300</div>
    <div id="joystick-zone"><div id="joystick-knob"></div></div>
    
    <div id="hud">
        <button id="close-menu-btn">Закрыть и играть</button>
        <div class="balance-container">Баланс: $<span id="balance-display">0</span></div>
        <div class="case-section">
            <button id="open-case-btn">Открыть кейс ($250)</button>
            <div id="roulette">???</div>
        </div>
        <div class="inventory-section">
            <h3>Инвентарь</h3>
            <div id="inventory-list"></div>
        </div>
    </div>

    <script type="module">
        // Перехватчик ошибок для вывода на экран
        window.onerror = function(msg, url, line) {
            document.getElementById('error-log').innerHTML += msg + '<br>';
        };

        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

        let camera, scene, renderer, weapon;
        const targets = [];
        const raycaster = new THREE.Raycaster();
        const centerScreen = new THREE.Vector2(0, 0);

        let touchLeftId = null, touchRightId = null;
        let moveVector = new THREE.Vector2(0, 0);
        let joystickCenter = new THREE.Vector2(0, 0);
        const maxJoystickRadius = 60;
        const joystickKnob = document.getElementById('joystick-knob');
        
        let lastRightTouchX = 0, lastRightTouchY = 0;
        let euler = new THREE.Euler(0, 0, 0, 'YXZ');
        let rightTouchStartTime = 0;
        let rightTouchMoved = false;
        let prevTime = performance.now();

        let playerBalance = 1000;
        let isCaseOpening = false;
        const skinDatabase = [
            { name: "Asimov", color: 0xff8800 }, { name: "Hyper Beast", color: 0xff00ff },
            { name: "Dragon Lore", color: 0xffcc00 }, { name: "Vulcan", color: 0x00aaff }
        ];
        let playerInventory = [{ name: "Default", color: 0x555555 }];

        try {
            init();
            animate();
        } catch (e) {
            document.getElementById('error-log').innerHTML += e.message;
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.y = 1.6;

            scene.add(new THREE.HemisphereLight(0xeeeeff, 0x777788, 0.75));
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshLambertMaterial({ color: 0x3a4f3f }));
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            weapon = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.15, 0.6), new THREE.MeshStandardMaterial({ color: 0x555555 }));
            weapon.position.set(0.25, -0.25, -0.5); 
            camera.add(weapon);
            scene.add(camera);

            const targetMat = new THREE.MeshLambertMaterial({ color: 0xcc2222 });
            for (let i = 0; i < 10; i++) {
                const target = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), targetMat.clone());
                target.position.set((Math.random() - 0.5) * 35, 1, (Math.random() - 0.5) * 35);
                scene.add(target);
                targets.push(target);
            }

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            document.body.addEventListener('touchstart', handleTouchStart, {passive: false});
            document.body.addEventListener('touchmove', handleTouchMove, {passive: false});
            document.body.addEventListener('touchend', handleTouchEnd, {passive: false});

            document.getElementById('menu-toggle-btn').addEventListener('click', () => { document.getElementById('hud').style.display = 'flex'; });
            document.getElementById('close-menu-btn').addEventListener('click', () => { document.getElementById('hud').style.display = 'none'; });

            updateUI(); renderInventory();
        }

        function handleTouchStart(e) {
            if (document.getElementById('hud').style.display === 'flex') return;
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                if (touch.clientX < window.innerWidth / 2 && touchLeftId === null) {
                    touchLeftId = touch.identifier;
                    joystickCenter.set(touch.clientX, touch.clientY);
                    document.getElementById('joystick-zone').style.left = (touch.clientX - 60) + 'px';
                    document.getElementById('joystick-zone').style.top = (touch.clientY - 60) + 'px';
                } else if (touch.clientX >= window.innerWidth / 2 && touchRightId === null) {
                    if (e.target.id === 'menu-toggle-btn') continue;
                    touchRightId = touch.identifier;
                    lastRightTouchX = touch.clientX; lastRightTouchY = touch.clientY;
                    rightTouchMoved = false; rightTouchStartTime = Date.now();
                }
            }
        }

        function handleTouchMove(e) {
            if (document.getElementById('hud').style.display === 'flex') return;
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                if (touch.identifier === touchLeftId) {
                    let dX = touch.clientX - joystickCenter.x, dY = touch.clientY - joystickCenter.y;
                    const dist = Math.sqrt(dX*dX + dY*dY);
                    if (dist > maxJoystickRadius) { dX = (dX/dist)*maxJoystickRadius; dY = (dY/dist)*maxJoystickRadius; }
                    joystickKnob.style.transform = `translate(calc(-50% + ${dX}px), calc(-50% + ${dY}px))`;
                    moveVector.set(dX / maxJoystickRadius, dY / maxJoystickRadius);
                } else if (touch.identifier === touchRightId) {
                    rightTouchMoved = true;
                    euler.setFromQuaternion(camera.quaternion);
                    euler.y -= (touch.clientX - lastRightTouchX) * 0.005;
                    euler.x -= (touch.clientY - lastRightTouchY) * 0.005;
                    euler.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, euler.x));
                    camera.quaternion.setFromEuler(euler);
                    lastRightTouchX = touch.clientX; lastRightTouchY = touch.clientY;
                }
            }
        }

        function handleTouchEnd(e) {
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                if (touch.identifier === touchLeftId) {
                    touchLeftId = null; moveVector.set(0, 0);
                    joystickKnob.style.transform = `translate(-50%, -50%)`;
                    document.getElementById('joystick-zone').style.left = '30px';
                    document.getElementById('joystick-zone').style.top = 'auto';
                } else if (touch.identifier === touchRightId) {
                    touchRightId = null;
                    if (!rightTouchMoved || Date.now() - rightTouchStartTime < 250) shoot();
                }
            }
        }

        function shoot() {
            weapon.position.z += 0.05; setTimeout(() => weapon.position.z -= 0.05, 50);
            raycaster.setFromCamera(centerScreen, camera);
            const intersects = raycaster.intersectObjects(targets);
            if (intersects.length > 0) {
                const hit = intersects[0].object;
                playerBalance += 300; updateUI();
                const m = document.getElementById('hit-marker');
                m.style.opacity = 1; m.style.top = '48%';
                setTimeout(() => { m.style.opacity = 0; m.style.top = '55%'; }, 500);
                const c = hit.material.color.getHex();
                hit.material.color.setHex(0xffffff);
                setTimeout(() => {
                    hit.material.color.setHex(c);
                    hit.position.set((Math.random() - 0.5) * 35, 1, (Math.random() - 0.5) * 35);
                }, 100);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = (performance.now() - prevTime) / 1000; prevTime = performance.now();
            if (touchLeftId !== null) {
                const fwd = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion); fwd.y = 0; fwd.normalize();
                const rgt = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion); rgt.y = 0; rgt.normalize();
                camera.position.add(fwd.multiplyScalar(-moveVector.y * 10.0 * delta));
                camera.position.add(rgt.multiplyScalar(moveVector.x * 10.0 * delta));
            }
            renderer.render(scene, camera);
        }

        function updateUI() {
            document.getElementById('balance-display').innerText = playerBalance;
            document.getElementById('open-case-btn').disabled = (playerBalance < 250 || isCaseOpening);
        }

        document.getElementById('open-case-btn').addEventListener('click', () => {
            if (playerBalance >= 250 && !isCaseOpening) { playerBalance -= 250; updateUI(); startCaseRoulette(); }
        });

        function startCaseRoulette() {
            isCaseOpening = true; updateUI();
            let ticks = 0;
            const r = document.getElementById('roulette');
            const int = setInterval(() => {
                const s = skinDatabase[Math.floor(Math.random() * skinDatabase.length)];
                r.innerText = s.name; r.style.color = '#' + s.color.toString(16).padStart(6, '0');
                if (++ticks >= 30) {
                    clearInterval(int);
                    playerInventory.push(s); renderInventory();
                    r.innerText = `Выпало: ${s.name}!`;
                    isCaseOpening = false; updateUI();
                }
            }, 60);
        }

        function renderInventory() {
            const list = document.getElementById('inventory-list'); list.innerHTML = '';
            playerInventory.forEach((skin) => {
                const div = document.createElement('div'); div.className = 'skin-item'; div.style.borderColor = '#' + skin.color.toString(16).padStart(6, '0');
                div.innerHTML = `<span style="color:#${skin.color.toString(16).padStart(6, '0')}">${skin.name}</span>`;
                const btn = document.createElement('button'); btn.innerText = 'Экипировать'; btn.className = 'equip-btn';
                btn.onclick = () => { weapon.material.color.setHex(skin.color); document.getElementById('hud').style.display = 'none'; };
                div.appendChild(btn); list.appendChild(div);
            });
        }
    </script>
</body>
</html>
